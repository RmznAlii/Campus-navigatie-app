<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/route-detail.css">
</head>
<body>
    <div class="app app-route-detail">

        <header class="hero hero-route-detail">
            <a class="back-btn" href="kaart.html">&#8592; terug</a>
            <button class="lang-btn" type="button">
                <img src="IMG/icons/taal.png" alt="Taal" class="lang-icon">
                <span>Language</span>
            </button>
        </header>

        <main class="content content-route-detail">
            <div class="route-title-row">
                <h1 class="route-room-title" id="roomTitle">Room AC1.22/1.24</h1>
                <div class="route-accessibility-wrap" aria-label="Toegankelijkheid">
                    <img src="IMG/icons/gehandicapte.png" alt="Toegankelijk" class="route-accessibility-icon">
                    <label class="route-toggle" for="accessibilityToggle">
                        <input type="checkbox" id="accessibilityToggle">
                        <span class="route-toggle-track"></span>
                    </label>
                </div>
            </div>

            <!-- Map visualization -->
            <div class="route-map-container">
                <div class="route-map-wrapper">
                    <img id="mapImage" src="" alt="Plattegrond" class="route-map-image">
                    <div class="route-overlay">
                        <!-- Start marker -->
                        <div id="startMarker" class="marker marker-start" style="display:none;">
                            <img src="IMG/icons/user_marker.png" alt="Startpunt" class="marker-user-icon">
                        </div>
                        <!-- End marker -->
                        <div id="endMarker" class="marker marker-end" style="display:none;">
                            <img src="IMG/icons/cooordinaat_punt.png" alt="Eindpunt" class="marker-end-icon">
                        </div>
                        <!-- Route line -->
                        <svg id="routeLine" class="route-svg" style="display:none;"></svg>
                    </div>
                </div>
            </div>

            <!-- Route info card -->
            <div class="route-info-section">
                <div class="info-card">
                    <p id="routeInfoText" class="route-info-text">
                        Start location: Aula<br>
                        Walk time: 1 min<br>
                        Floor: 1<br>
                        Arrival: 14:25
                    </p>
                </div>
                
                <button class="btn-start-route" id="startBtn">Start Route</button>
            </div>
        </main>

        <nav class="bottom-nav" aria-label="Onderste navigatie">
            <a class="nav-item" href="index.html">
                <img src="IMG/icons/navbar/home.png" alt="Home" class="nav-icon">
                <small>Home</small>
            </a>
            <a class="nav-item" href="kaart.html">
                <img src="IMG/icons/navbar/kaart.png" alt="Kaart" class="nav-icon">
                <small>Kaart</small>
            </a>
            <a class="nav-item active" href="route.html" aria-current="page">
                <img src="IMG/icons/navbar/route.png" alt="Route" class="nav-icon">
                <small>Route</small>
            </a>
            <a class="nav-item" href="info.html">
                <img src="IMG/icons/navbar/info.png" alt="Info" class="nav-icon">
                <small>Info</small>
            </a>
        </nav>
    </div>

    <script>
        // Get room name from URL query parameter
        function getRoomFromQuery() {
            var params = new URLSearchParams(window.location.search);
            return params.get('q') || '';
        }

        // Parse room name to get building code and floor
        function parseRoomName(naam) {
            var match = naam.match(/([A-Z]+)(\d+)\.(\d+)/);
            if (match) {
                return {
                    building: match[1],
                    floor: parseInt(match[2]),
                    room: match[3]
                };
            }
            return null;
        }

        // Get map image for building
        function getMapForBuilding(building) {
            var maps = {
                'AC': 'IMG/plattegronden/AC1_NIEUW.png',
                'AL': 'IMG/plattegronden/AL1_NIEUW.png'
            };
            return maps[building] || 'IMG/plattegronden/AC1_NIEUW.png';
        }

        // Load lokalen data
        async function loadLokalen() {
            try {
                var response = await fetch('data/locaties.json');
                var data = await response.json();
                return data.lokalen || [];
            } catch (error) {
                console.error('Error loading lokalen:', error);
                return [];
            }
        }

        // Find lokaal by name
        function findRoom(rooms, name) {
            return rooms.find(function(r) {
                return r.naam && r.naam.toLowerCase() === name.toLowerCase();
            });
        }

        function hasCoordinates(coordinaten) {
            return coordinaten
                && coordinaten.x !== null
                && coordinaten.y !== null
                && !Number.isNaN(Number(coordinaten.x))
                && !Number.isNaN(Number(coordinaten.y));
        }

        // Convert legacy AC1 coordinates to AC1_NIEUW coordinate space.
        function mapCoordinatesForRoute(lokaalNaam, coordinaten) {
            if (!hasCoordinates(coordinaten)) {
                return coordinaten;
            }

            var naam = String(lokaalNaam || '').toUpperCase();
            if (naam.indexOf('AC1.') !== 0) {
                return coordinaten;
            }

            var oldWidth = 1028;
            var oldHeight = 912;
            var rotatedWidth = oldHeight;
            var rotatedHeight = oldWidth;
            var newWidth = 3360;
            var newHeight = 3693;
            var scale = newHeight / rotatedHeight;
            var horizontalMargin = (newWidth - (rotatedWidth * scale)) / 2;

            var oldX = (Number(coordinaten.x) / 100) * oldWidth;
            var oldY = (Number(coordinaten.y) / 100) * oldHeight;

            var rotatedX = oldY;
            var rotatedY = oldWidth - oldX;

            var mappedX = horizontalMargin + (rotatedX * scale);
            var mappedY = rotatedY * scale;

            return {
                x: (mappedX / newWidth) * 100,
                y: (mappedY / newHeight) * 100
            };
        }

        // Format floor name
        function getFloorLabel(floor) {
            if (floor === 0) return 'Begane grond';
            return floor + 'e verdieping';
        }

        // Initialize page
        async function init() {
            var roomName = getRoomFromQuery();
            if (!roomName) return;

            // Update title
            document.getElementById('roomTitle').textContent = 'Room ' + roomName;

            // Parse room
            var parsed = parseRoomName(roomName);
            if (!parsed) return;

            // Load rooms data
            var allRooms = await loadLokalen();
            var room = findRoom(allRooms, roomName);
            if (!room) return;

            // Update floor info
            var infoText = document.getElementById('routeInfoText');
            infoText.innerHTML = 'Start location: Aula<br>'
                + 'Walk time: 1 min<br>'
                + 'Floor: ' + parsed.floor + '<br>'
                + 'Arrival: 14:25';

            // Load map
            var mapPath = getMapForBuilding(parsed.building);
            var mapImg = document.getElementById('mapImage');
            mapImg.src = mapPath;

            // When map loads, show markers and route
            mapImg.onload = function() {
                var mappedCoords = mapCoordinatesForRoute(roomName, room.coordinaten);
                showRoute(mapImg, mappedCoords);
            };
        }

        // Show route on map
        function showRoute(mapImg, coords) {
            if (!coords || !coords.x || !coords.y) return;

            var startMarker = document.getElementById('startMarker');
            var endMarker = document.getElementById('endMarker');
            var routeLine = document.getElementById('routeLine');

            // Show markers
            startMarker.style.display = 'block';
            endMarker.style.display = 'block';
            routeLine.style.display = 'block';

            // Position markers (percentage-based)
            var startX = 16;
            var startY = 72;
            var endX = coords.x;
            var endY = coords.y;

            startMarker.style.left = startX + '%';
            startMarker.style.top = startY + '%';
            endMarker.style.left = endX + '%';
            endMarker.style.top = endY + '%';

            // Draw line
            var mapRect = mapImg.getBoundingClientRect();
            if (mapRect.width > 0 && mapRect.height > 0) {
                routeLine.setAttribute('width', mapRect.width);
                routeLine.setAttribute('height', mapRect.height);
                routeLine.setAttribute('viewBox', '0 0 ' + mapRect.width + ' ' + mapRect.height);

                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                var sx = (startX / 100) * mapRect.width;
                var sy = (startY / 100) * mapRect.height;
                var ex = (endX / 100) * mapRect.width;
                var ey = (endY / 100) * mapRect.height;
                var cx = (sx + ex) / 2;
                var cy = Math.min(sy, ey) - mapRect.height * 0.14;

                path.setAttribute('d', 'M ' + sx + ' ' + sy + ' Q ' + cx + ' ' + cy + ' ' + ex + ' ' + ey);
                path.setAttribute('stroke', '#232323');
                path.setAttribute('stroke-width', '4');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke-linecap', 'round');

                routeLine.innerHTML = '';
                routeLine.appendChild(path);
            }
        }

        document.getElementById('accessibilityToggle').addEventListener('change', function() {
            document.body.classList.toggle('accessibility-enabled', this.checked);
        });

        // Start button
        document.getElementById('startBtn').addEventListener('click', function() {
            var roomName = getRoomFromQuery();
            alert('Route gestart naar ' + roomName + '!');
        });

        // Initialize
        init();
    </script>
</body>
</html>
