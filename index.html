<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigatie App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="hero hero-home">
            <button class="lang-btn" type="button">
                <img src="IMG/icons/taal.png" alt="Taal" class="lang-icon">
                <span>Taal</span>
            </button>
        </header>

        <main class="content">
            <div class="hero-text">
                <h1>Welkom!</h1>
            </div>

            <form id="indexLokaalForm" class="card card-search" action="route-detail.html" method="get">
                <div class="card-top">
                    <img src="IMG/icons/search.png" alt="Zoek" class="card-icon">
                    <h2>Zoek lokaal</h2>
                    <button id="indexLokaalBtn" class="card-go" type="submit" aria-label="Ga naar lokaal zoeken">›</button>
                </div>
                <input id="indexLokaalInput" type="search" name="q" aria-label="Zoek lokaal" placeholder="Voer lokaal nummer in..." />
            </form>

            <form id="indexKaartForm" class="card card-map" action="kaart.html" method="get">
                <div class="card-top">
                    <img src="IMG/icons/kaart.png" alt="Kaart" class="card-icon">
                    <h2>Campus kaart</h2>
                    <button id="indexKaartBtn" class="card-go" type="submit" aria-label="Ga naar campus kaart">›</button>
                </div>
                <input id="indexKaartInput" type="search" name="q" aria-label="Campus kaart" placeholder="Voer lokaal nummer in..." />
            </form>

            <div class="divider"></div>

            <a class="button-link" href="gebouw-info.html">
                <span class="button-flex">
                    <img src="IMG/icons/kalender.png" alt="Info" class="button-icon">
                    <span>Gebouw info</span>
                </span>
                <span class="button-arrow">›</span>
            </a>
        </main>

        <nav class="bottom-nav" aria-label="Onderste navigatie">
            <a class="nav-item active" href="index.html" aria-current="page">
                <img src="IMG/icons/navbar/home.png" alt="Home" class="nav-icon">
                <small>Home</small>
            </a>
            <a class="nav-item" href="kaart.html">
                <img src="IMG/icons/navbar/kaart.png" alt="Kaart" class="nav-icon">
                <small>Kaart</small>
            </a>
            <a class="nav-item" href="route.html">
                <img src="IMG/icons/navbar/route.png" alt="Route" class="nav-icon">
                <small>Route</small>
            </a>
            <a class="nav-item" href="info.html">
                <img src="IMG/icons/navbar/info.png" alt="Info" class="nav-icon">
                <small>Info</small>
            </a>
        </nav>
    </div>

    <script src="js/pages/index.js"></script>
</body>
</html>
