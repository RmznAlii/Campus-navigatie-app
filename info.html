<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/info.css">
</head>
<body>
    <div class="app app-info">
        <header class="hero hero-info">
            <a class="info-back" href="index.html">&#8249; terug</a>
            <h1 class="info-header-title">Gebouw info</h1>
            <button class="lang-btn" type="button" aria-label="Selecteer taal">
                <img src="IMG/icons/taal.png" alt="Taal" class="lang-icon">
                <span>Taal</span>
            </button>
        </header>

        <main class="content content-info">
            <section class="info-panel">
                <h2 class="info-building-name">Windesheim Circus</h2>
                <hr class="info-divider">

                <ul class="info-list">
                    <li>2 verdiepingen</li>
                    <li>Faciliteiten: kantine, studieruimtes en lokalen.</li>
                    <li>Openingstijd: 7:30-18:30</li>
                </ul>

                <hr class="info-divider">

                <h3 class="info-section-title">Informatie</h3>
                <ul class="info-list info-list-bottom">
                    <li>Wi-Fi: Windesheim WIFI</li>
                    <li>3 nooduitgangen</li>
                </ul>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Onderste navigatie">
            <a class="nav-item" href="index.html">
                <img src="IMG/icons/navbar/home.png" alt="Home" class="nav-icon">
                <small>Home</small>
            </a>
            <a class="nav-item" href="kaart.html">
                <img src="IMG/icons/navbar/kaart.png" alt="Kaart" class="nav-icon">
                <small>Kaart</small>
            </a>
            <a class="nav-item" href="route.html">
                <img src="IMG/icons/navbar/route.png" alt="Route" class="nav-icon">
                <small>Route</small>
            </a>
            <a class="nav-item active" href="info.html" aria-current="page">
                <img src="IMG/icons/navbar/info.png" alt="Info" class="nav-icon">
                <small>Info</small>
            </a>
        </nav>
    </div>

</body>
</html>
