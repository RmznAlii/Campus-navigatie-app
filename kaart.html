<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Kaart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/kaart.css">
</head>
<body>
    <div class="app app-kaart">
        <header class="hero hero-kaart">
            <a class="kaart-back" href="index.html">&#8592; terug</a>
            <h1 class="kaart-header-title">Campus kaart</h1>
            <button class="lang-btn" type="button">
                <img src="IMG/icons/taal.png" alt="Taal" class="lang-icon">
                <span>Taal</span>
            </button>
        </header>

        <main class="content content-page content-kaart">
            <section class="kaart-search-shell">
                <form id="kaartSearchForm" class="kaart-search-form">
                    <div class="kaart-search-bar">
                        <img src="IMG/icons/search.png" alt="Zoeken" class="kaart-search-icon">
                        <input id="kaartSearchInput" name="q" type="search" placeholder="Zoek lokaal..." autocomplete="off">
                    </div>
                    <button type="submit" class="kaart-btn">Vind route</button>
                </form>

                <div class="kaart-filter-row">
                    <button class="kaart-chip kaart-chip-muted" type="button">Filter</button>
                    <div class="kaart-chip-group">
                        <span class="kaart-chip" id="kaartGebouwChip">Gebouw</span>
                        <span class="kaart-chip" id="kaartVerdiepingChip">Verdieping</span>
                    </div>
                </div>
            </section>

            <section class="page-card kaart-viewport-card">
                <div class="kaart-panel-top">
                    <div class="kaart-info-head">
                        <h2 id="kaartTitle">Plattegrond overzicht</h2>
                        <p id="kaartStatus">Kies een lokaal om de bijbehorende plattegrond te laden.</p>
                    </div>
                    <div class="kaart-meta" id="kaartMeta"></div>
                </div>
                <div class="kaart-stage" id="kaartStage">
                    <div class="kaart-image-wrap">
                        <img id="kaartImage" class="kaart-image" src="IMG/plattegronden/AL0.png" alt="Plattegrond campus">
                        <img id="kaartMarker" class="kaart-marker hidden" src="IMG/icons/cooordinaat_punt.png" alt="Locatiepunt van lokaal">
                    </div>
                    <div id="kaartEmpty" class="kaart-empty">De marker verschijnt automatisch zodra er coordinaten voor het lokaal beschikbaar zijn.</div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Onderste navigatie">
            <a class="nav-item" href="index.html">
                <img src="IMG/icons/navbar/home.png" alt="Home" class="nav-icon">
                <small>Home</small>
            </a>
            <a class="nav-item active" href="kaart.html" aria-current="page">
                <img src="IMG/icons/navbar/kaart.png" alt="Kaart" class="nav-icon">
                <small>Kaart</small>
            </a>
            <a class="nav-item" href="route.html">
                <img src="IMG/icons/navbar/route.png" alt="Route" class="nav-icon">
                <small>Route</small>
            </a>
            <a class="nav-item" href="info.html">
                <img src="IMG/icons/navbar/info.png" alt="Info" class="nav-icon">
                <small>Info</small>
            </a>
        </nav>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
