<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/route.css">
</head>
<body>
    <div class="app app-route">

        <header class="hero hero-route">
            <a class="back-btn" href="index.html">&#8592; terug</a>
            <h1 class="page-title">Route lokaal</h1>
            <button class="lang-btn" type="button">
                <img src="IMG/icons/taal.png" alt="Taal" class="lang-icon">
                <span>Taal</span>
            </button>
        </header>

        <main class="content content-route-bg">
            <form class="route-search-form" id="routeForm">
                <div class="route-search-bar">
                    <img src="IMG/icons/search.png" alt="Zoek" class="search-icon-sm">
                    <input type="text" id="routeInput" placeholder="Zoek lokaal..." autocomplete="off">
                </div>
                <button type="submit" class="btn-green">Vind route</button>
            </form>

            <div class="recent-section">
                <p class="recent-label">Recent gezocht</p>
                <hr class="recent-divider">
                <ul class="recent-list" id="recentList"></ul>
            </div>
        </main>

        <nav class="bottom-nav" aria-label="Onderste navigatie">
            <a class="nav-item" href="index.html">
                <img src="IMG/icons/navbar/home.png" alt="Home" class="nav-icon">
                <small>Home</small>
            </a>
            <a class="nav-item" href="kaart.html">
                <img src="IMG/icons/navbar/kaart.png" alt="Kaart" class="nav-icon">
                <small>Kaart</small>
            </a>
            <a class="nav-item active" href="route.html" aria-current="page">
                <img src="IMG/icons/navbar/route.png" alt="Route" class="nav-icon">
                <small>Route</small>
            </a>
            <a class="nav-item" href="info.html">
                <img src="IMG/icons/navbar/info.png" alt="Info" class="nav-icon">
                <small>Info</small>
            </a>
        </nav>
    </div>

    <script src="js/pages/route.js"></script>
</body>
</html>
