<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/route-detail.css">
</head>
<body>
    <div class="app app-route-detail">

        <header class="hero hero-route-detail">
            <a class="back-btn" href="kaart.html">&#8592; terug</a>
            <button class="lang-btn" type="button">
                <img src="IMG/icons/taal.png" alt="Taal" class="lang-icon">
                <span>Language</span>
            </button>
        </header>

        <main class="content content-route-detail">
            <div class="route-title-row">
                <h1 class="route-room-title" id="roomTitle">Room AC1.22/1.24</h1>
                <div class="route-accessibility-wrap" aria-label="Toegankelijkheid">
                    <img src="IMG/icons/gehandicapte.png" alt="Toegankelijk" class="route-accessibility-icon">
                    <label class="route-toggle" for="accessibilityToggle">
                        <input type="checkbox" id="accessibilityToggle">
                        <span class="route-toggle-track"></span>
                    </label>
                </div>
            </div>

            <!-- Map visualization -->
            <div class="route-map-container">
                <div class="route-map-wrapper">
                    <img id="mapImage" src="" alt="Plattegrond" class="route-map-image">
                    <div class="route-overlay">
                        <!-- Start marker -->
                        <div id="startMarker" class="marker marker-start" style="display:none;">
                            <img src="IMG/icons/user_marker.png" alt="Startpunt" class="marker-user-icon">
                        </div>
                        <!-- End marker -->
                        <div id="endMarker" class="marker marker-end" style="display:none;">
                            <img src="IMG/icons/cooordinaat_punt.png" alt="Eindpunt" class="marker-end-icon">
                        </div>
                        <!-- Route line -->
                        <svg id="routeLine" class="route-svg" style="display:none;"></svg>
                    </div>
                </div>
            </div>

            <!-- Route info card -->
            <div class="route-info-section">
                <div class="info-card">
                    <p id="routeInfoText" class="route-info-text">
                        Start location: Aula<br>
                        Walk time: 1 min<br>
                        Floor: 1<br>
                        Arrival: 14:25
                    </p>
                </div>
                
                <button class="btn-start-route" id="startBtn">Start Route</button>
            </div>
        </main>

        <nav class="bottom-nav" aria-label="Onderste navigatie">
            <a class="nav-item" href="index.html">
                <img src="IMG/icons/navbar/home.png" alt="Home" class="nav-icon">
                <small>Home</small>
            </a>
            <a class="nav-item" href="kaart.html">
                <img src="IMG/icons/navbar/kaart.png" alt="Kaart" class="nav-icon">
                <small>Kaart</small>
            </a>
            <a class="nav-item active" href="route.html" aria-current="page">
                <img src="IMG/icons/navbar/route.png" alt="Route" class="nav-icon">
                <small>Route</small>
            </a>
            <a class="nav-item" href="info.html">
                <img src="IMG/icons/navbar/info.png" alt="Info" class="nav-icon">
                <small>Info</small>
            </a>
        </nav>
    </div>

    <script src="js/pages/route-detail.js"></script>
</body>
</html>
